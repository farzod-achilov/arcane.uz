<svg viewBox="0 0 400 480" xmlns="http://www.w3.org/2000/svg" width="400" height="480">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');</style>

    <!-- Gradients -->
    <linearGradient id="g-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#9D60FA"/>
      <stop offset="50%"  stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="g-border-v" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#9D60FA"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="g-cabinet" x1="0%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%"   stop-color="#1C0A35"/>
      <stop offset="100%" stop-color="#0C0C1A"/>
    </linearGradient>
    <linearGradient id="g-marquee" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1E0845"/>
      <stop offset="50%"  stop-color="#280D55"/>
      <stop offset="100%" stop-color="#081840"/>
    </linearGradient>
    <linearGradient id="g-screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0E0128"/>
      <stop offset="100%" stop-color="#00081E"/>
    </linearGradient>
    <linearGradient id="g-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="30%"  stop-color="#C4B5FD"/>
      <stop offset="65%"  stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="g-diamond" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="g-btn1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#9D60FA"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="g-btn2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <radialGradient id="g-ambient" cx="50%" cy="48%" r="50%">
      <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-portal" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#7C3AED" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>

    <!-- Filters -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="text-glow" x="-8%" y="-30%" width="116%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ░░ Ambient background glow ░░ -->
  <ellipse cx="200" cy="200" rx="180" ry="210" fill="url(#g-ambient)"/>
  <ellipse cx="200" cy="390" rx="130" ry="45" fill="#7C3AED" opacity="0.07" filter="url(#glow-lg)"/>

  <!-- ░░ Cabinet soft shadow ░░ -->
  <path d="M138 18 L262 18 L304 54 L304 290 L96 290 L96 54 Z"
        fill="#7C3AED" opacity="0.12" filter="url(#glow-lg)"/>

  <!-- ░░ CABINET BODY ░░ -->
  <path d="M140 20 L260 20 L300 56 L300 288 L100 288 L100 56 Z"
        fill="url(#g-cabinet)" stroke="url(#g-border)" stroke-width="2.5"/>

  <!-- Inner edge highlight -->
  <path d="M142 23 L258 23 L296 57 L296 100"
        fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ░░ MARQUEE ░░ -->
  <path d="M140 20 L260 20 L300 56 L300 84 L100 84 L100 56 Z"
        fill="url(#g-marquee)"/>

  <!-- Marquee divider line with glow -->
  <line x1="100" y1="84" x2="300" y2="84"
        stroke="url(#g-border)" stroke-width="2" filter="url(#glow-sm)"/>

  <!-- Marquee top border -->
  <line x1="140" y1="21" x2="260" y2="21"
        stroke="url(#g-border)" stroke-width="1.5" opacity="0.8"/>

  <!-- Marquee sparkles -->
  <text x="116" y="60" font-size="11" fill="#9D60FA" opacity="0.75" filter="url(#glow-sm)">✦</text>
  <text x="268" y="58" font-size="9"  fill="#06B6D4" opacity="0.75" filter="url(#glow-sm)">✦</text>

  <!-- Marquee text -->
  <text x="200" y="62"
        text-anchor="middle"
        font-family="'Press Start 2P', 'Courier New', monospace"
        font-size="15" fill="white"
        letter-spacing="2"
        filter="url(#text-glow)">ARCANE.UZ</text>

  <!-- ░░ SCREEN BEZEL ░░ -->
  <rect x="110" y="94" width="180" height="138" rx="5"
        fill="#08051A" stroke="url(#g-border-v)" stroke-width="2"/>

  <!-- Screen surface -->
  <rect x="116" y="100" width="168" height="126" rx="3"
        fill="url(#g-screen)"/>

  <!-- ── Pixel portal arch ── -->
  <!-- Left pillar -->
  <rect x="148" y="128" width="10" height="62" fill="#5B21B6" rx="1"/>
  <rect x="138" y="136" width="10" height="54" fill="#4C1D95" rx="1"/>
  <!-- Right pillar -->
  <rect x="242" y="128" width="10" height="62" fill="#5B21B6" rx="1"/>
  <rect x="252" y="136" width="10" height="54" fill="#4C1D95" rx="1"/>
  <!-- Arch top (pixel blocks) -->
  <rect x="158" y="116" width="84" height="10" fill="#7C3AED" rx="1"/>
  <rect x="148" y="124" width="10" height="10" fill="#7C3AED" rx="1"/>
  <rect x="242" y="124" width="10" height="10" fill="#7C3AED" rx="1"/>
  <!-- Arch corner accent -->
  <rect x="138" y="128" width="10" height="8"  fill="#6D28D9" rx="1"/>
  <rect x="252" y="128" width="10" height="8"  fill="#6D28D9" rx="1"/>
  <!-- Portal steps -->
  <rect x="138" y="188" width="124" height="6"  fill="#4C1D95" opacity="0.85" rx="1"/>
  <rect x="142" y="194" width="116" height="5"  fill="#3B1480" opacity="0.75" rx="1"/>
  <rect x="146" y="199" width="108" height="4"  fill="#2D0E65" opacity="0.65" rx="1"/>
  <!-- Portal light -->
  <ellipse cx="200" cy="158" rx="28" ry="34" fill="url(#g-portal)"/>
  <ellipse cx="200" cy="156" rx="6"  ry="7"  fill="white" opacity="0.7" filter="url(#glow)"/>
  <!-- Cross star -->
  <line x1="200" y1="148" x2="200" y2="164" stroke="white" stroke-width="1.8" opacity="0.9" filter="url(#glow-sm)"/>
  <line x1="192" y1="156" x2="208" y2="156" stroke="white" stroke-width="1.8" opacity="0.9" filter="url(#glow-sm)"/>
  <!-- Screen corner sparkles -->
  <text x="122" y="114" font-size="9" fill="white"  opacity="0.35">✦</text>
  <text x="266" y="112" font-size="8" fill="#06B6D4" opacity="0.40">✦</text>
  <text x="260" y="200" font-size="7" fill="#9D60FA" opacity="0.35">✦</text>

  <!-- Screen scanline overlay -->
  <rect x="116" y="100" width="168" height="126" rx="3"
        fill="none"
        style="background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px)"
        opacity="0.4"/>

  <!-- ░░ CONTROL PANEL ░░ -->
  <path d="M100 244 L300 244 L305 288 L95 288 Z"
        fill="#0C0A1E" stroke="url(#g-border)" stroke-width="1.5"/>

  <!-- Panel inner line -->
  <line x1="100" y1="244" x2="300" y2="244"
        stroke="url(#g-border)" stroke-width="1.5" opacity="0.6" filter="url(#glow-sm)"/>

  <!-- Joystick base rings -->
  <circle cx="148" cy="270" r="20" fill="#12102A" stroke="#7C3AED" stroke-width="1.5" opacity="0.9"/>
  <circle cx="148" cy="270" r="15" fill="#0E0C22" stroke="#5B21B6" stroke-width="1"/>
  <!-- Shaft -->
  <line x1="148" y1="270" x2="145" y2="254"
        stroke="#8B5CF6" stroke-width="4" stroke-linecap="round"/>
  <!-- Ball -->
  <circle cx="144" cy="252" r="8" fill="#7C3AED" filter="url(#glow)"/>
  <circle cx="142" cy="250" r="5" fill="#A78BFA"/>
  <circle cx="141" cy="249" r="2" fill="white" opacity="0.5"/>

  <!-- Button 1 (purple) -->
  <circle cx="218" cy="270" r="16" fill="#140830" stroke="#7C3AED" stroke-width="1.5"/>
  <circle cx="218" cy="268" r="12" fill="url(#g-btn1)" filter="url(#glow-sm)"/>
  <circle cx="215" cy="265" r="5"  fill="white" opacity="0.2"/>

  <!-- Button 2 (cyan) -->
  <circle cx="256" cy="270" r="16" fill="#00101E" stroke="#06B6D4" stroke-width="1.5"/>
  <circle cx="256" cy="268" r="12" fill="url(#g-btn2)" filter="url(#glow-sm)"/>
  <circle cx="253" cy="265" r="5"  fill="white" opacity="0.2"/>

  <!-- ░░ TEXT PLATFORM ░░ -->
  <!-- Platform shape -->
  <path d="M42 308 L358 308 L366 322 L366 358 L358 370 L42 370 L34 358 L34 322 Z"
        fill="#07070E" stroke="url(#g-border)" stroke-width="2.5"/>
  <!-- Top inner shine -->
  <path d="M44 310 L356 310 L364 323"
        fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1.2"/>

  <!-- Main ARCANE.UZ text -->
  <text x="200" y="349"
        text-anchor="middle"
        font-family="'Press Start 2P', 'Courier New', monospace"
        font-size="27" fill="url(#g-text)"
        letter-spacing="1.5"
        filter="url(#text-glow)">ARCANE.UZ</text>

  <!-- ░░ DIAMOND + ORNAMENT ░░ -->
  <!-- Left line -->
  <line x1="55"  y1="393" x2="172" y2="393" stroke="url(#g-border)" stroke-width="1.2" opacity="0.55"/>
  <!-- Right line -->
  <line x1="228" y1="393" x2="345" y2="393" stroke="url(#g-border)" stroke-width="1.2" opacity="0.55"/>
  <!-- Dots left -->
  <circle cx="68"  cy="393" r="2.5" fill="#7C3AED" opacity="0.8" filter="url(#glow-sm)"/>
  <circle cx="106" cy="393" r="1.5" fill="#7C3AED" opacity="0.5"/>
  <circle cx="144" cy="393" r="1.5" fill="#9D60FA" opacity="0.4"/>
  <!-- Dots right -->
  <circle cx="332" cy="393" r="2.5" fill="#06B6D4" opacity="0.8" filter="url(#glow-sm)"/>
  <circle cx="294" cy="393" r="1.5" fill="#06B6D4" opacity="0.5"/>
  <circle cx="256" cy="393" r="1.5" fill="#22D3EE" opacity="0.4"/>

  <!-- Diamond gem -->
  <polygon points="200,376 216,393 200,410 184,393"
           fill="url(#g-diamond)" filter="url(#glow-lg)"/>
  <polygon points="200,380 212,393 200,406 188,393"
           fill="url(#g-diamond)" opacity="0.6"/>
  <!-- Diamond facets -->
  <line x1="200" y1="380" x2="200" y2="406" stroke="white" stroke-width="0.7" opacity="0.4"/>
  <line x1="188" y1="393" x2="212" y2="393" stroke="white" stroke-width="0.7" opacity="0.4"/>
  <polygon points="200,380 212,393 200,393" fill="white" opacity="0.12"/>
  <!-- Diamond core glow -->
  <circle cx="200" cy="393" r="4" fill="white" opacity="0.5" filter="url(#glow)"/>

</svg>
