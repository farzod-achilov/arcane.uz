# ARCANE.UZ — nginx reverse proxy
# Install to: /etc/nginx/sites-available/arcane
# Enable:     ln -s /etc/nginx/sites-available/arcane /etc/nginx/sites-enabled/
# Test+reload: nginx -t && systemctl reload nginx
#
# Then run certbot to add HTTPS automatically:
#   certbot --nginx -d arcane.com.uz -d www.arcane.com.uz
# Certbot rewrites this file: adds the :443 server block, the SSL certs and an
# HTTP→HTTPS redirect. Start with this HTTP-only block.

upstream arcane_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name arcane.com.uz www.arcane.com.uz;

    # Bulk key import / large admin payloads
    client_max_body_size 10M;

    # gzip
    gzip on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml image/svg+xml;

    # ── Next.js static assets — immutable, cache hard ───────────────────────
    location /_next/static/ {
        proxy_pass http://arcane_app;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── SSE: live notifications stream — no buffering, long-lived ───────────
    location /api/notifications/stream {
        proxy_pass http://arcane_app;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    # ── Everything else → Next.js ───────────────────────────────────────────
    location / {
        proxy_pass http://arcane_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
