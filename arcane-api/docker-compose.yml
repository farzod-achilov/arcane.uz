version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: arcane_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: arcane
      POSTGRES_PASSWORD: arcane_secret
      POSTGRES_DB: arcane_db
    ports:
      # 5433 на хосте: 5432 занят postgres соседнего проекта (wbtaxi)
      - '5433:5432'
    volumes:
      - arcane_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U arcane -d arcane_db']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: arcane_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - arcane_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  arcane_pg_data:
  arcane_redis_data:
