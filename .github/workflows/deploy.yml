name: Deploy to arcane.com.uz

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 89.39.95.250
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          # deploy.sh делает всё сам: pull, npm ci, prisma generate + db push,
          # stop -> build -> start (только процесс arcane) и health-check.
          # Секретам здесь не место — они живут в .env / .env.local на сервере.
          script: |
            bash /var/www/arcane/deploy.sh
            pm2 status
